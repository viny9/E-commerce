<div class="delete">
  <mat-form-field>
    <mat-label>Nome do produto</mat-label>
    <input type="text" matInput>
  </mat-form-field>

  <mat-form-field>
    <mat-label>Preço do produto</mat-label>
    <input type="text" matInput>
  </mat-form-field>
  <div class="actions">
    <button mat-raised-button color="warn" (click)="close()">Cancel</button>
    <button mat-raised-button color="primary" (click)="close()">Remover</button>
  </div>

</div>

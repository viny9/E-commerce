<div class="main">
    <div class="products">
        <mat-card class="product" *ngFor="let product of products"  (click)="selectedProduct(product)">
            <div class="img">
                <img [src]="product.img" alt="">
            </div>
                <h2>{{product.name}}</h2>
                <h3>R${{product.price}}</h3>
        </mat-card>
    </div>
</div>
